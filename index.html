<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palmieri ABNT - Com Prévia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #FFF8E1;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 8px;
        }
        .sub {
            text-align: center;
            color: #666;
            margin-bottom: 24px;
        }
        .drop-area {
            border: 2px dashed #ccc;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            background: #fefefe;
        }
        .drop-area:hover, .drag-over {
            border-color: #F97316;
            background: #FFF8E1;
        }
        .btn {
            background: #F97316;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-secondary {
            background: #27272A;
        }
        .hidden { display: none; }
        .preview-area {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 16px;
            padding: 16px;
            max-height: 300px;
            overflow: auto;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            margin: 16px 0;
        }
        .status {
            padding: 12px;
            border-radius: 12px;
            margin: 12px 0;
        }
        .status.success { background: #E8F5E9; color: #2E7D32; }
        .status.error { background: #FFEBEE; color: #EF5350; }
        .status.info { background: #E3F2FD; color: #1565C0; }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #F97316;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📄 Palmieri ABNT</h1>
        <div class="sub">Formatação automática com pré-visualização</div>

        <div class="drop-area" id="dropArea">
            📂 Arraste seu arquivo .docx aqui ou clique para selecionar
            <input type="file" id="fileInput" accept=".docx" hidden>
        </div>

        <div id="fileInfo" class="hidden" style="margin-top: 16px; background:#E8F5E9; padding:12px; border-radius:16px;">
            <strong>📄 Arquivo:</strong> <span id="fileName"></span>
            <button id="clearBtn" style="float:right; background:none; border:none; cursor:pointer;">✖️</button>
        </div>

        <div class="flex-between" style="margin-top: 16px;">
            <label><strong>📝 Nome do PDF:</strong></label>
            <input type="text" id="pdfName" style="flex:1; margin-left:12px; padding:8px; border-radius:20px; border:1px solid #ccc;" placeholder="Nome do arquivo">
        </div>

        <!-- Área de prévia do texto extraído -->
        <div id="previewBox" class="hidden">
            <div class="flex-between">
                <strong>🔍 PRÉVIA DO TEXTO EXTRAÍDO (verifique se aparece o conteúdo)</strong>
                <span id="charCount" style="font-size:12px; color:#666;"></span>
            </div>
            <div id="previewContent" class="preview-area"></div>
        </div>

        <!-- Lista de títulos detectados (opcional, mas útil) -->
        <div id="titulosBox" class="hidden" style="margin-top: 16px;">
            <strong>📑 Títulos detectados:</strong>
            <div id="titulosList" style="background:#fafafa; border-radius:12px; padding:12px; margin-top:8px; max-height:150px; overflow:auto;"></div>
            <button id="buscarTitulosBtn" class="btn btn-secondary" style="margin-top:8px; padding:6px 12px; font-size:12px;">🔍 Buscar mais títulos</button>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 20px;">
            <button id="gerarPdfBtn" class="btn" disabled>✨ Gerar PDF</button>
            <button id="limparBtn" class="btn btn-secondary">🗑️ Limpar</button>
        </div>

        <div id="statusMsg" class="status hidden"></div>
        <div id="loadingMsg" class="hidden" style="margin-top:16px; text-align:center;"><span class="loader"></span> Processando...</div>
    </div>
    <div style="text-align:center; font-size:12px; color:#999;">⚡ Processamento local – nenhum dado sai do seu computador</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
    (function(){
        // Elementos
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');
        const fileNameSpan = document.getElementById('fileName');
        const clearBtn = document.getElementById('clearBtn');
        const pdfNameInput = document.getElementById('pdfName');
        const previewBox = document.getElementById('previewBox');
        const previewContent = document.getElementById('previewContent');
        const charCount = document.getElementById('charCount');
        const titulosBox = document.getElementById('titulosBox');
        const titulosList = document.getElementById('titulosList');
        const gerarBtn = document.getElementById('gerarPdfBtn');
        const limparBtn = document.getElementById('limparBtn');
        const statusDiv = document.getElementById('statusMsg');
        const loadingDiv = document.getElementById('loadingMsg');
        const buscarTitulosBtn = document.getElementById('buscarTitulosBtn');

        let arquivoAtual = null;
        let textoExtraido = '';
        let titulos = [];

        // Abrir seletor de arquivo
        dropArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if(e.target.files[0]) processarArquivo(e.target.files[0]);
        });
        dropArea.addEventListener('dragover', (e) => { e.preventDefault(); dropArea.classList.add('drag-over'); });
        dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
        dropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropArea.classList.remove('drag-over');
            if(e.dataTransfer.files[0]) processarArquivo(e.dataTransfer.files[0]);
        });

        clearBtn.addEventListener('click', limparTudo);
        limparBtn.addEventListener('click', limparTudo);
        gerarBtn.addEventListener('click', gerarPDF);
        buscarTitulosBtn.addEventListener('click', extrairTitulosDoTexto);

        function mostrarStatus(texto, tipo) {
            statusDiv.textContent = texto;
            statusDiv.className = `status ${tipo}`;
            statusDiv.classList.remove('hidden');
            setTimeout(() => statusDiv.classList.add('hidden'), 5000);
        }

        function limparTudo() {
            arquivoAtual = null;
            textoExtraido = '';
            titulos = [];
            previewBox.classList.add('hidden');
            titulosBox.classList.add('hidden');
            gerarBtn.disabled = true;
            fileInput.value = '';
            document.getElementById('fileInfo').classList.add('hidden');
            pdfNameInput.value = '';
            mostrarStatus('Pronto para novo arquivo.', 'info');
        }

        async function processarArquivo(file) {
            if(!file.name.endsWith('.docx')) {
                mostrarStatus('❌ O arquivo deve ser .docx', 'error');
                return;
            }
            if(file.size > 50*1024*1024) {
                mostrarStatus('❌ Arquivo muito grande (>50MB)', 'error');
                return;
            }

            loadingDiv.classList.remove('hidden');
            arquivoAtual = file;
            document.getElementById('fileInfo').classList.remove('hidden');
            fileNameSpan.textContent = file.name;
            pdfNameInput.value = file.name.replace(/\.docx$/i, '') + ' - Formatado ABNT';

            try {
                const arrayBuffer = await file.arrayBuffer();
                // Extrair texto puro (mais confiável)
                const result = await mammoth.extractRawText({ arrayBuffer });
                textoExtraido = result.value;
                
                if(!textoExtraido || textoExtraido.trim().length < 20) {
                    throw new Error('Texto extraído está vazio ou muito curto.');
                }

                // Mostrar prévia
                previewContent.innerText = textoExtraido.substring(0, 2000) + (textoExtraido.length > 2000 ? '... (cortado para prévia)' : '');
                charCount.innerText = `${textoExtraido.length} caracteres`;
                previewBox.classList.remove('hidden');

                // Extrair títulos
                extrairTitulosDoTexto();
                
                gerarBtn.disabled = false;
                mostrarStatus(`✅ Documento carregado! ${textoExtraido.length} caracteres extraídos.`, 'success');
            } catch(err) {
                console.error(err);
                mostrarStatus('❌ Erro ao ler o arquivo: ' + err.message, 'error');
                gerarBtn.disabled = true;
            } finally {
                loadingDiv.classList.add('hidden');
            }
        }

        function extrairTitulosDoTexto() {
            if(!textoExtraido) return;
            const linhas = textoExtraido.split(/\r?\n/);
            const palavrasChave = ['INTRODUÇÃO','OBJETIVO','METODOLOGIA','CONCLUSÃO','REFERÊNCIAS','BLOCO','QUESTÃO','RESPOSTA','ANEXO'];
            const novosTitulos = [];
            for(let linha of linhas) {
                linha = linha.trim();
                if(linha.length < 3 || linha.length > 150) continue;
                const upper = linha.toUpperCase();
                const temKeyword = palavrasChave.some(p => upper.includes(p));
                const temNumero = /^\d+\./.test(linha);
                const temNegrito = linha.includes('**') || linha.includes('*'); // simulação, pois no texto puro não há negrito
                if(temKeyword || temNumero) {
                    let nivel = (temNumero && linha.match(/\./g)?.length === 1) ? 1 : 2;
                    novosTitulos.push({ texto: linha, nivel });
                }
            }
            if(novosTitulos.length > 0) {
                titulos = novosTitulos;
                titulosList.innerHTML = titulos.map(t => `<div style="margin-bottom:6px;">▪️ Nível ${t.nivel}: ${t.texto.substring(0,80)}</div>`).join('');
                titulosBox.classList.remove('hidden');
            } else {
                titulosBox.classList.add('hidden');
            }
        }

        async function gerarPDF() {
            if(!arquivoAtual || !textoExtraido) {
                mostrarStatus('Nenhum documento carregado.', 'error');
                return;
            }
            const nomePDF = pdfNameInput.value.trim();
            if(!nomePDF) {
                mostrarStatus('Digite um nome para o PDF.', 'error');
                return;
            }

            loadingDiv.classList.remove('hidden');
            gerarBtn.disabled = true;

            try {
                // Construir o HTML do documento ABNT
                const titulosHtml = gerarSumarioHtml();
                const conteudoHtml = textoExtraido.split(/\r?\n/).map(par => `<p>${escapeHtml(par)}</p>`).join('');
                const docHtml = `
                    <!DOCTYPE html>
                    <html>
                    <head><meta charset="UTF-8"><title>${escapeHtml(nomePDF)}</title>
                    <style>
                        @page { size: A4; margin: 3cm 2cm 2cm 3cm; }
                        body { font-family: 'Times New Roman', Arial, sans-serif; font-size: 12pt; line-height: 1.5; text-align: justify; margin: 0; padding: 0; }
                        h1 { font-size: 14pt; text-align: center; text-transform: uppercase; margin: 20pt 0; }
                        p { text-indent: 1.25cm; margin: 0 0 6pt; }
                        .sumario { margin: 20pt 0; }
                        .sumario h2 { text-align: center; text-transform: uppercase; }
                        .sumario ul { list-style: none; padding-left: 0; }
                        .sumario li { margin-bottom: 4pt; }
                        .page-break { page-break-before: always; }
                    </style>
                    </head>
                    <body>
                        <h1>${escapeHtml(nomePDF)}</h1>
                        <div class="sumario">${titulosHtml}</div>
                        <div class="page-break"></div>
                        ${conteudoHtml}
                    </body>
                    </html>
                `;

                // Criar um elemento temporário para renderizar
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = docHtml;
                tempDiv.style.position = 'absolute';
                tempDiv.style.left = '0';
                tempDiv.style.top = '0';
                tempDiv.style.width = '210mm';
                tempDiv.style.background = 'white';
                tempDiv.style.zIndex = '-1';
                tempDiv.style.opacity = '0.01';
                document.body.appendChild(tempDiv);

                // Usar html2canvas + jsPDF
                const canvas = await html2canvas(tempDiv, { scale: 2, backgroundColor: '#ffffff' });
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const imgWidth = 210; // A4 largura em mm
                const pageHeight = 297;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                let position = 0;
                pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                if (imgHeight > pageHeight) {
                    let remaining = imgHeight - pageHeight;
                    let offset = pageHeight;
                    while (remaining > 0) {
                        pdf.addPage();
                        pdf.addImage(imgData, 'PNG', 0, -offset, imgWidth, imgHeight);
                        offset += pageHeight;
                        remaining -= pageHeight;
                    }
                }
                pdf.save(nomePDF + '.pdf');

                document.body.removeChild(tempDiv);
                mostrarStatus(`✅ PDF "${nomePDF}.pdf" gerado com sucesso!`, 'success');
            } catch(err) {
                console.error(err);
                mostrarStatus('❌ Falha ao gerar PDF. Tente usar "Salvar como PDF" pelo navegador (Ctrl+P).', 'error');
                // Fallback: abrir janela de impressão
                const fallbackHtml = `
                    <html><head><title>${nomePDF}</title>
                    <style>body { font-family: Arial; margin: 2cm; } p { text-indent: 1.25cm; }</style>
                    </head><body><h1>${nomePDF}</h1><pre>${escapeHtml(textoExtraido)}</pre></body></html>
                `;
                const win = window.open();
                win.document.write(fallbackHtml);
                win.document.close();
                win.print();
            } finally {
                loadingDiv.classList.add('hidden');
                gerarBtn.disabled = false;
            }
        }

        function gerarSumarioHtml() {
            if(titulos.length === 0) return '<p>Nenhum título detectado.</p>';
            let html = '<h2>SUMÁRIO</h2><ul>';
            for(let t of titulos) {
                html += `<li style="margin-left:${(t.nivel-1)*20}px">${escapeHtml(t.texto)}</li>`;
            }
            html += '</ul>';
            return html;
        }

        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
    })();
</script>
</body>
</html>
